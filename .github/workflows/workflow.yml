name: workflow.yml

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Bygg med Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Sätt upp JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Bygg med Maven
        run: mvn --batch-mode package